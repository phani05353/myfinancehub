version: '3.8'

services:
  finance:
    build: .
    container_name: home-finance
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data        # SQLite DB — survives rebuilds
      - ./uploads:/app/uploads  # Temp upload staging
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
