<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1d27">
  <title>Home Finance</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div class="splash-logo">
      <div class="splash-icon">$</div>
      <div class="splash-text">Home Finance</div>
    </div>
  </div>

  <!-- Mobile-only top bar -->
  <header class="mobile-header">
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <a href="#/dashboard" class="mobile-logo" onclick="closeSidebar()">
      <span class="logo-icon">$</span>
      Home Finance
    </a>
    <div id="mobile-overdue-dot" style="display:none;width:8px;height:8px;background:var(--danger);border-radius:50%"></div>
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Desktop sidebar collapse toggle -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar" onclick="toggleSidebar()">
    <svg id="sidebar-toggle-icon" width="10" height="14" viewBox="0 0 10 14" fill="none">
      <path d="M7 2L2 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <a href="#/dashboard" class="logo" onclick="closeSidebar()">
      <span class="logo-icon">$</span>
      <span>Home Finance</span>
    </a>
    <ul>
      <li><a href="#/dashboard"     class="nav-link">📊 Dashboard</a></li>
      <li><a href="#/transactions"  class="nav-link">💳 Transactions</a></li>
      <li><a href="#/budget"        class="nav-link">💰 Budget</a></li>
      <li><a href="#/subscriptions" class="nav-link">🔁 Subscriptions</a></li>
      <li><a href="#/reminders"     class="nav-link">🔔 Bill Reminders</a></li>
      <li><a href="#/charts"        class="nav-link">📈 Charts</a></li>
      <li><a href="#/import"        class="nav-link">📥 Import &amp; Export</a></li>
      <li><a href="#/year-review"  class="nav-link">📅 Year in Review</a></li>
      <li><a href="#/rules"        class="nav-link">⚡ Rules Engine</a></li>
    </ul>
    <div id="overdue-badge" class="overdue-alert hidden"></div>
    <div class="sidebar-user">
      <div class="sidebar-username" id="sidebar-username">—</div>
      <div class="sidebar-user-actions">
        <button class="btn btn-ghost btn-sm" id="manage-users-btn" style="display:none" onclick="manageUsersModal()">👥 Manage Users</button>
        <button class="btn btn-ghost btn-sm" onclick="changePasswordModal()">🔑 Change Password</button>
        <a href="/auth/logout" class="btn btn-ghost btn-sm">↩ Sign Out</a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="content">
    <div id="view"></div>
  </main>

  <!-- Floating add button -->
  <button id="fab" onclick="transactionsModule.openAddModal()" aria-label="Add transaction">+</button>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <a class="bn-tab" href="#/dashboard" data-route="#/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/>
      </svg>
      <span>Dashboard</span>
    </a>
    <a class="bn-tab" href="#/transactions" data-route="#/transactions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
      </svg>
      <span>Transactions</span>
    </a>
    <a class="bn-tab" href="#/budget" data-route="#/budget">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
      </svg>
      <span>Budget</span>
    </a>
    <a class="bn-tab" href="#/charts" data-route="#/charts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
      <span>Charts</span>
    </a>
    <button class="bn-tab" id="bn-more" onclick="openSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="5" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="5" cy="19" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="19" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      <span>More</span>
    </button>
  </nav>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <button id="modal-close" onclick="closeModal()">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // Desktop sidebar collapse
    function toggleSidebar() {
      const collapsed = document.body.classList.toggle('sidebar-collapsed');
      localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0');
      updateToggleIcon(collapsed);
    }
    function updateToggleIcon(collapsed) {
      const path = document.querySelector('#sidebar-toggle-icon path');
      if (collapsed) {
        path.setAttribute('d', 'M3 2l5 5-5 5'); // chevron right
      } else {
        path.setAttribute('d', 'M7 2L2 7l5 5'); // chevron left
      }
    }
    // Restore state on load
    if (localStorage.getItem('sidebarCollapsed') === '1') {
      document.body.classList.add('sidebar-collapsed');
      updateToggleIcon(true);
    }
  </script>
  <script src="/js/app.js"></script>
  <script src="/js/transactions.js"></script>
  <script src="/js/budget.js"></script>
  <script src="/js/subscriptions.js"></script>
  <script src="/js/reminders.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/import.js"></script>
  <script src="/js/yearreview.js"></script>
  <script src="/js/rules.js"></script>
</body>
</html>
